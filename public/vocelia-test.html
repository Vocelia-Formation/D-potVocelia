<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocelia — Test de niveau gratuit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1C1F2E;
  --paper: #F6F1E9;
  --accent: #0B7A75;
  --accent-light: #12B5AE;
  --accent-bg: #E0F0EF;
  --red: #E8603C;
  --yellow: #E8603C;
  --yellow-bg: #FDECE6;
  --green: #0B7A75;
  --green-bg: #E0F0EF;
  --muted: #6B7280;
  --border: #D8CEBC;
  --card: #FFFDF8;
  --shadow: 0 2px 20px rgba(28,31,46,0.06);
  --shadow-lg: 0 8px 40px rgba(28,31,46,0.10);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; }

.header { background:var(--ink); color:white; padding:2rem 0; text-align:center; position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; top:-80px; right:-40px; width:300px; height:300px; background:radial-gradient(circle,var(--red) 0%,transparent 65%); opacity:0.1; }
.header .logo { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:800; margin-bottom:0.5rem; position:relative; z-index:1; }
.header .logo span { color:var(--red); }
.header h1 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:800; position:relative; z-index:1; }
.header p { opacity:0.7; margin-top:0.4rem; font-size:0.95rem; position:relative; z-index:1; }

.container { max-width:750px; margin:0 auto; padding:2rem; }

/* Language selector */
.lang-selector { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem; }
.lang-btn { padding:0.7rem 1.5rem; border:2px solid var(--border); border-radius:var(--radius-sm); background:var(--card); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600; transition:all 0.25s; display:flex; align-items:center; gap:0.5rem; }
.lang-btn:hover { border-color:var(--accent); background:var(--accent-bg); }
.lang-btn.active { border-color:var(--accent); background:var(--accent); color:white; }

/* Progress */
.progress-bar { width:100%; height:6px; background:var(--border); border-radius:3px; margin-bottom:2rem; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.4s ease; }
.progress-text { text-align:center; font-size:0.82rem; color:var(--muted); margin-bottom:1rem; }

/* Question card */
.question-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; box-shadow:var(--shadow); margin-bottom:1.5rem; animation:fadeUp 0.4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.q-number { font-size:0.75rem; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:0.5rem; }
.q-text { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; margin-bottom:1.5rem; line-height:1.4; }
.q-options { display:flex; flex-direction:column; gap:0.6rem; }
.q-option { padding:0.8rem 1.2rem; border:2px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; font-size:0.95rem; transition:all 0.25s; }
.q-option:hover { border-color:var(--accent-light); background:var(--accent-bg); }
.q-option.selected { border-color:var(--accent); background:var(--accent-bg); font-weight:600; }
.q-option.correct { border-color:var(--green); background:var(--green-bg); }
.q-option.wrong { border-color:var(--red); background:#FDECE6; }

.btn { padding:0.8rem 1.8rem; border-radius:var(--radius-sm); border:none; font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.95rem; cursor:pointer; transition:all 0.25s; display:inline-flex; align-items:center; gap:0.4rem; }
.btn-primary { background:var(--accent); color:white; }
.btn-primary:hover { background:var(--accent-light); }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
.btn-secondary { background:transparent; color:var(--muted); border:2px solid var(--border); text-decoration:none; }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
.btn-row { display:flex; gap:0.8rem; justify-content:space-between; margin-top:1.5rem; }

/* Result */
.result-card { background:var(--card); border:2px solid var(--accent); border-radius:var(--radius); padding:2.5rem; text-align:center; box-shadow:var(--shadow-lg); animation:fadeUp 0.5s ease; }
.result-level { font-family:'Playfair Display',serif; font-size:3.5rem; font-weight:800; color:var(--accent); margin:1rem 0 0.3rem; }
.result-label { font-size:1.1rem; font-weight:600; margin-bottom:0.5rem; }
.result-score { font-size:0.9rem; color:var(--muted); margin-bottom:1.5rem; }
.result-desc { font-size:0.95rem; color:var(--muted); line-height:1.7; max-width:500px; margin:0 auto 2rem; }
.result-actions { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }

/* Intro */
.intro-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:2.5rem; text-align:center; box-shadow:var(--shadow); }
.intro-card h2 { font-family:'Playfair Display',serif; font-size:1.5rem; margin-bottom:0.6rem; }
.intro-card p { color:var(--muted); font-size:0.95rem; line-height:1.7; margin-bottom:1.5rem; }
.intro-features { display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem; }
.intro-feat { font-size:0.85rem; color:var(--accent); font-weight:600; display:flex; align-items:center; gap:0.3rem; }
</style>
</head>

// Shuffle + pick 15 questions (3 per level: A1, A2, B1, B2, C1)
function pickQuestions(langue) {
  var pool = QUESTION_POOL[langue];
  var byLevel = {};
  pool.forEach(function(q) {
    if (!byLevel[q.level]) byLevel[q.level] = [];
    byLevel[q.level].push(q);
  });
  var levels = ["A1","A2","B1","B2","C1"];
  var selected = [];
  levels.forEach(function(lv) {
    var arr = byLevel[lv] || [];
    // Shuffle
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    selected = selected.concat(arr.slice(0, 3));
  });
  return selected;
}

function render() {

    case 'intro': renderIntro(app); break;

function startQuiz(langue) {
  var questions = pickQuestions(langue);
  state = { screen:'quiz', langue:langue, questions:questions, current:0, answers:new Array(questions.length).fill(null), score:0 };
  render();
}

function renderQuiz(app) {
  const questions = state.questions;
  const q = questions[state.current];
  const total = questions.length;
  const progress = ((state.current) / total * 100);
  const langLabels = { fle:'FLE', anglais:'Anglais', espagnol:'Espagnol' };

  app.innerHTML = `
    <div style="margin-bottom:1.5rem;">
      <div class="progress-text">${langLabels[state.langue]} — Question ${state.current + 1} sur ${total}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="question-card">
      <div class="q-number">Niveau ${q.level} — Question ${state.current + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">
        ${q.o.map((opt, i) => `<div class="q-option ${state.answers[state.current] === i ? 'selected' : ''}" onclick="selectAnswer(${i})">${opt}</div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" ${state.current === 0 ? 'disabled style="opacity:0.3"' : ''} onclick="prevQuestion()">← Précédent</button>
        <button class="btn btn-primary" ${state.answers[state.current] === null ? 'disabled' : ''} onclick="nextQuestion()">${state.current === total - 1 ? 'Voir mon résultat →' : 'Suivant →'}</button>
      </div>
    </div>
  `;
}

function selectAnswer(idx) {
  state.answers[state.current] = idx;
  render();
}

function prevQuestion() {
  if (state.current > 0) { state.current--; render(); }
}

function nextQuestion() {
  const questions = state.questions;
  if (state.current < questions.length - 1) {
    state.current++;
    render();
  } else {
    // Calculate score
    state.score = 0;
    questions.forEach((q, i) => { if (state.answers[i] === q.a) state.score++; });
    state.screen = 'result';
    render();
  }
}

function renderResult(app) {
  const questions = state.questions;
  const total = questions.length;
  let level = LEVELS[0];
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (state.score >= LEVELS[i].min) { level = LEVELS[i]; break; }
  }
  const pct = Math.round(state.score / total * 100);
  const langLabels = { fle:'FLE', anglais:'Anglais', espagnol:'Espagnol' };

  let reviewHtml = '';
  questions.forEach(function(q, i) {
    const userAnswer = state.answers[i];
    const isCorrect = userAnswer === q.a;

    reviewHtml += '<div style="background:var(--card);border:1px solid '+(isCorrect?'var(--green)':'var(--red)')+';border-left:4px solid '+(isCorrect?'var(--green)':'var(--red)')+';border-radius:var(--radius-sm);padding:1rem 1.2rem;margin-bottom:0.6rem;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">' +
        '<span style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);">Question '+(i+1)+' · Niveau '+q.level+'</span>' +
        '<span style="font-size:0.78rem;font-weight:700;color:'+(isCorrect?'var(--green)':'var(--red)')+';">'+(isCorrect?'✓ Correct':'✗ Incorrect')+'</span>' +
      '</div>' +
      '<div style="font-weight:600;font-size:0.95rem;margin-bottom:0.5rem;">'+q.q+'</div>';

    if (isCorrect) {
      reviewHtml += '<div style="font-size:0.85rem;color:var(--green);font-weight:500;">→ '+q.o[q.a]+'</div>';
    } else {
      reviewHtml += '<div style="font-size:0.85rem;color:var(--red);margin-bottom:0.2rem;"><s>Votre réponse : '+q.o[userAnswer]+'</s></div>' +
        '<div style="font-size:0.85rem;color:var(--green);font-weight:600;">Bonne réponse : '+q.o[q.a]+'</div>';
    }
    reviewHtml += '</div>';
  });

  app.innerHTML =
    '<div class="result-card">' +
      '<div style="font-size:0.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Votre niveau en '+langLabels[state.langue]+'</div>' +
      '<div class="result-level">'+level.code+'</div>' +
      '<div class="result-label">'+level.label+'</div>' +
      '<div class="result-score">'+state.score+' / '+total+' bonnes réponses ('+pct+'%)</div>' +
      '<div class="result-desc">'+level.desc+'</div>' +
      '<div style="background:var(--accent-bg);padding:1rem;border-radius:var(--radius-sm);margin-bottom:1.5rem;font-size:0.9rem;">' +
        '<strong>Et maintenant ?</strong> Obtenez un devis personnalisé pour une formation adaptée à votre niveau '+level.code+' et atteignez le niveau supérieur !' +
      '</div>' +
      '<div class="result-actions">' +
        '<a href="vocelia-devis.html" class="btn btn-primary">Obtenir mon devis →</a>' +
        '<button class="btn btn-secondary" onclick="state.screen=\'intro\';render();">Refaire le test</button>' +
        '<a href="vocelia-landing.html" class="btn btn-secondary">Retour au site</a>' +
      '</div>' +
    '</div>' +
    '<div style="margin-top:2rem;">' +
      '<div style="font-family:\'Playfair Display\',serif;font-size:1.3rem;font-weight:700;margin-bottom:1rem;">Détail de vos réponses</div>' +
      reviewHtml +
    '</div>';
}

// Init
render();
</script>
</body>
</html>
