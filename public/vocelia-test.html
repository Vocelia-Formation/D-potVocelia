<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocelia — Test de niveau gratuit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1C1F2E;
  --paper: #F6F1E9;
  --accent: #0B7A75;
  --accent-light: #12B5AE;
  --accent-bg: #E0F0EF;
  --red: #E8603C;
  --yellow: #E8603C;
  --yellow-bg: #FDECE6;
  --green: #0B7A75;
  --green-bg: #E0F0EF;
  --muted: #6B7280;
  --border: #D8CEBC;
  --card: #FFFDF8;
  --shadow: 0 2px 20px rgba(28,31,46,0.06);
  --shadow-lg: 0 8px 40px rgba(28,31,46,0.10);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; }

.header { background:var(--ink); color:white; padding:2rem 0; text-align:center; position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; top:-80px; right:-40px; width:300px; height:300px; background:radial-gradient(circle,var(--red) 0%,transparent 65%); opacity:0.1; }
.header .logo { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:800; margin-bottom:0.5rem; position:relative; z-index:1; }
.header .logo span { color:var(--red); }
.header h1 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:800; position:relative; z-index:1; }
.header p { opacity:0.7; margin-top:0.4rem; font-size:0.95rem; position:relative; z-index:1; }

.container { max-width:750px; margin:0 auto; padding:2rem; }

/* Language selector */
.lang-selector { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem; }
.lang-btn { padding:0.7rem 1.5rem; border:2px solid var(--border); border-radius:var(--radius-sm); background:var(--card); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600; transition:all 0.25s; display:flex; align-items:center; gap:0.5rem; }
.lang-btn:hover { border-color:var(--accent); background:var(--accent-bg); }
.lang-btn.active { border-color:var(--accent); background:var(--accent); color:white; }

/* Progress */
.progress-bar { width:100%; height:6px; background:var(--border); border-radius:3px; margin-bottom:2rem; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.4s ease; }
.progress-text { text-align:center; font-size:0.82rem; color:var(--muted); margin-bottom:1rem; }

/* Question card */
.question-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; box-shadow:var(--shadow); margin-bottom:1.5rem; animation:fadeUp 0.4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.q-number { font-size:0.75rem; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:0.5rem; }
.q-text { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; margin-bottom:1.5rem; line-height:1.4; }
.q-options { display:flex; flex-direction:column; gap:0.6rem; }
.q-option { padding:0.8rem 1.2rem; border:2px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; font-size:0.95rem; transition:all 0.25s; }
.q-option:hover { border-color:var(--accent-light); background:var(--accent-bg); }
.q-option.selected { border-color:var(--accent); background:var(--accent-bg); font-weight:600; }
.q-option.correct { border-color:var(--green); background:var(--green-bg); }
.q-option.wrong { border-color:var(--red); background:#FDECE6; }

.btn { padding:0.8rem 1.8rem; border-radius:var(--radius-sm); border:none; font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.95rem; cursor:pointer; transition:all 0.25s; display:inline-flex; align-items:center; gap:0.4rem; }
.btn-primary { background:var(--accent); color:white; }
.btn-primary:hover { background:var(--accent-light); }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
.btn-secondary { background:transparent; color:var(--muted); border:2px solid var(--border); text-decoration:none; }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
.btn-row { display:flex; gap:0.8rem; justify-content:space-between; margin-top:1.5rem; }

/* Result */
.result-card { background:var(--card); border:2px solid var(--accent); border-radius:var(--radius); padding:2.5rem; text-align:center; box-shadow:var(--shadow-lg); animation:fadeUp 0.5s ease; }
.result-level { font-family:'Playfair Display',serif; font-size:3.5rem; font-weight:800; color:var(--accent); margin:1rem 0 0.3rem; }
.result-label { font-size:1.1rem; font-weight:600; margin-bottom:0.5rem; }
.result-score { font-size:0.9rem; color:var(--muted); margin-bottom:1.5rem; }
.result-desc { font-size:0.95rem; color:var(--muted); line-height:1.7; max-width:500px; margin:0 auto 2rem; }
.result-actions { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }

/* Intro */
.intro-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:2.5rem; text-align:center; box-shadow:var(--shadow); }
.intro-card h2 { font-family:'Playfair Display',serif; font-size:1.5rem; margin-bottom:0.6rem; }
.intro-card p { color:var(--muted); font-size:0.95rem; line-height:1.7; margin-bottom:1.5rem; }
.intro-features { display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem; }
.intro-feat { font-size:0.85rem; color:var(--accent); font-weight:600; display:flex; align-items:center; gap:0.3rem; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Voce<span>lia</span></div>
  <h1>📝 Test de niveau gratuit</h1>
  <p>Évaluez votre niveau en quelques minutes — Résultat immédiat CECRL</p>
</div>

<div class="container">
  <div id="app"></div>
</div>

<script>
// ── QUESTIONS DATABASE ──
const QUESTIONS = {
  anglais: [
    { q:"What ___ your name?", o:["is","are","am","be"], a:0, level:"A1" },
    { q:"She ___ to school every day.", o:["go","goes","going","gone"], a:1, level:"A1" },
    { q:"I ___ breakfast at 7 AM yesterday.", o:["have","has","had","having"], a:2, level:"A1" },
    { q:"There aren't ___ apples in the fridge.", o:["some","any","much","a"], a:1, level:"A2" },
    { q:"He's taller ___ his brother.", o:["that","then","than","as"], a:2, level:"A2" },
    { q:"If I ___ more time, I would travel.", o:["have","had","has","having"], a:1, level:"B1" },
    { q:"She suggested ___ to the cinema.", o:["to go","going","go","gone"], a:1, level:"B1" },
    { q:"The report ___ by the time we arrived.", o:["had been finished","has been finished","was finishing","finished"], a:0, level:"B1" },
    { q:"Not until she spoke ___ I realize who she was.", o:["did","had","was","do"], a:0, level:"B2" },
    { q:"He denied ___ the document.", o:["to steal","stealing","steal","stolen"], a:1, level:"B2" },
    { q:"The project is ___ completion.", o:["nearing","approaching","getting","reaching"], a:0, level:"B2" },
    { q:"___ the circumstances, I think we did well.", o:["Given","Giving","Having given","Being given"], a:0, level:"C1" },
    { q:"She ___ have known about the meeting — nobody told her.", o:["can't","mustn't","needn't","shouldn't"], a:0, level:"C1" },
    { q:"The findings ___ with those of previous studies.", o:["are consonant","are pursuant","are congruent","are adjunct"], a:0, level:"C1" },
    { q:"His argument, ___ compelling on the surface, lacked substance.", o:["albeit","despite","whereas","notwithstanding"], a:0, level:"C1" }
  ],
  espagnol: [
    { q:"¿Cómo ___ llamas?", o:["te","se","me","le"], a:0, level:"A1" },
    { q:"Yo ___ español.", o:["hablo","hablas","habla","hablan"], a:0, level:"A1" },
    { q:"Ellos ___ en Madrid.", o:["vive","vives","vivimos","viven"], a:3, level:"A1" },
    { q:"Ayer ___ al cine con mis amigos.", o:["fui","fue","iba","iré"], a:0, level:"A2" },
    { q:"Me gustaría ___ un café, por favor.", o:["tomar","tomando","tomé","tomo"], a:0, level:"A2" },
    { q:"Si ___ más dinero, viajaría por el mundo.", o:["tengo","tuviera","tendré","tenga"], a:1, level:"B1" },
    { q:"Es importante que ___ a tiempo.", o:["llegas","llegues","llegarás","llegabas"], a:1, level:"B1" },
    { q:"Cuando ___ pequeño, jugaba en el parque.", o:["era","fue","es","será"], a:0, level:"B1" },
    { q:"No creo que ___ razón en este caso.", o:["tiene","tenga","tendrá","tuviera"], a:1, level:"B2" },
    { q:"El informe fue ___ por el director.", o:["aprobado","aprobando","aprobar","aprueba"], a:0, level:"B2" },
    { q:"___ que llueva, iremos de excursión.", o:["A menos","A pesar de","Dado","Sin embargo"], a:0, level:"B2" },
    { q:"De haber sabido la verdad, no ___ así.", o:["habría actuado","hubiera actuado","actuaría","actué"], a:0, level:"C1" },
    { q:"El orador hizo ___ de sus conocimientos.", o:["alarde","gala","muestra","ostentación"], a:0, level:"C1" },
    { q:"___ las circunstancias, actuó con prudencia.", o:["Habida cuenta de","En pos de","A raíz","Merced a"], a:0, level:"C1" },
    { q:"Su discurso, ___ elocuente, carecía de fondo.", o:["si bien","no obstante","a pesar","pese"], a:0, level:"C1" }
  ],
  fle: [
    { q:"Je ___ français.", o:["parle","parles","parlons","parlent"], a:0, level:"A1" },
    { q:"Où ___ la gare, s'il vous plaît ?", o:["est","es","et","ai"], a:0, level:"A1" },
    { q:"Ils ___ au cinéma hier soir.", o:["sont allés","ont allé","allaient","vont"], a:0, level:"A1" },
    { q:"Je voudrais ___ un croissant.", o:["prendre","prend","prends","pris"], a:0, level:"A2" },
    { q:"Il fait ___ temps aujourd'hui.", o:["beau","bon","belle","bien"], a:0, level:"A2" },
    { q:"Si j'avais le temps, je ___ plus souvent.", o:["voyagerais","voyage","voyagerai","voyageais"], a:0, level:"B1" },
    { q:"Il faut que tu ___ tes devoirs.", o:["fasses","fais","fait","faire"], a:0, level:"B1" },
    { q:"C'est le livre ___ je t'ai parlé.", o:["dont","que","qui","où"], a:0, level:"B1" },
    { q:"___ qu'il pleuve, nous irons à la plage.", o:["Bien","Quoique","À moins","Pourvu"], a:0, level:"B2" },
    { q:"Elle a nié ___ au courant de la situation.", o:["être","étant","avoir été","d'être"], a:0, level:"B2" },
    { q:"Le rapport a été rédigé ___ la directrice.", o:["par","pour","de","avec"], a:0, level:"B2" },
    { q:"___ les circonstances, sa réaction était justifiée.", o:["Eu égard à","En dépit","Faute de","À l'instar de"], a:0, level:"C1" },
    { q:"Son discours, ___ brillant, manquait de substance.", o:["quoique","malgré","nonobstant","bien"], a:0, level:"C1" },
    { q:"Il n'en ___ pas moins que la situation est grave.", o:["demeure","reste","va","fait"], a:0, level:"C1" },
    { q:"Cette mesure ___ à pallier les insuffisances du dispositif.", o:["vise","prétend","aspire","ambitionne"], a:0, level:"C1" }
  ]
};

const LEVELS = [
  { code:'A1', label:'Grand débutant', min:0, desc:'Vous pouvez comprendre et utiliser des expressions très simples.' },
  { code:'A2', label:'Élémentaire', min:3, desc:'Vous communiquez dans des situations simples et quotidiennes.' },
  { code:'B1', label:'Intermédiaire', min:5, desc:'Vous vous débrouillez dans la plupart des situations courantes.' },
  { code:'B2', label:'Intermédiaire avancé', min:8, desc:'Vous communiquez avec aisance et spontanéité dans des contextes variés.' },
  { code:'C1', label:'Avancé', min:11, desc:'Vous vous exprimez avec fluidité et précision sur des sujets complexes.' }
];

let state = { screen:'intro', langue:null, current:0, answers:[], score:0 };

function render() {
  const app = document.getElementById('app');
  switch(state.screen) {
    case 'intro': renderIntro(app); break;
    case 'quiz': renderQuiz(app); break;
    case 'result': renderResult(app); break;
  }
}

function renderIntro(app) {
  app.innerHTML = `
    <div class="intro-card">
      <h2>Évaluez votre niveau en quelques minutes</h2>
      <p>Choisissez votre langue et répondez à 15 questions de difficulté progressive. Votre résultat CECRL (A1 à C1) s'affiche immédiatement à la fin du test.</p>
      <div class="intro-features">
        <div class="intro-feat">✅ 15 questions</div>
        <div class="intro-feat">⏱️ ~5 minutes</div>
        <div class="intro-feat">📊 Résultat CECRL</div>
        <div class="intro-feat">🆓 100% gratuit</div>
      </div>
      <div style="font-weight:600;margin-bottom:1rem;">Choisissez votre langue :</div>
      <div class="lang-selector">
        <button class="lang-btn" onclick="startQuiz('fle')">🇫🇷 FLE</button>
        <button class="lang-btn" onclick="startQuiz('anglais')">🇬🇧 Anglais</button>
        <button class="lang-btn" onclick="startQuiz('espagnol')">🇪🇸 Espagnol</button>
      </div>
      <a href="vocelia-landing.html" class="btn btn-secondary" style="margin-top:0.5rem;">← Retour au site</a>
    </div>
  `;
}

function startQuiz(langue) {
  state = { screen:'quiz', langue, current:0, answers:new Array(QUESTIONS[langue].length).fill(null), score:0 };
  render();
}

function renderQuiz(app) {
  const questions = QUESTIONS[state.langue];
  const q = questions[state.current];
  const total = questions.length;
  const progress = ((state.current) / total * 100);
  const langLabels = { fle:'FLE', anglais:'Anglais', espagnol:'Espagnol' };

  app.innerHTML = `
    <div style="margin-bottom:1.5rem;">
      <div class="progress-text">${langLabels[state.langue]} — Question ${state.current + 1} sur ${total}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="question-card">
      <div class="q-number">Niveau ${q.level} — Question ${state.current + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">
        ${q.o.map((opt, i) => `<div class="q-option ${state.answers[state.current] === i ? 'selected' : ''}" onclick="selectAnswer(${i})">${opt}</div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" ${state.current === 0 ? 'disabled style="opacity:0.3"' : ''} onclick="prevQuestion()">← Précédent</button>
        <button class="btn btn-primary" ${state.answers[state.current] === null ? 'disabled' : ''} onclick="nextQuestion()">${state.current === total - 1 ? 'Voir mon résultat →' : 'Suivant →'}</button>
      </div>
    </div>
  `;
}

function selectAnswer(idx) {
  state.answers[state.current] = idx;
  render();
}

function prevQuestion() {
  if (state.current > 0) { state.current--; render(); }
}

function nextQuestion() {
  const questions = QUESTIONS[state.langue];
  if (state.current < questions.length - 1) {
    state.current++;
    render();
  } else {
    // Calculate score
    state.score = 0;
    questions.forEach((q, i) => { if (state.answers[i] === q.a) state.score++; });
    state.screen = 'result';
    render();
  }
}

function renderResult(app) {
  const questions = QUESTIONS[state.langue];
  const total = questions.length;
  let level = LEVELS[0];
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (state.score >= LEVELS[i].min) { level = LEVELS[i]; break; }
  }
  const pct = Math.round(state.score / total * 100);
  const langLabels = { fle:'FLE', anglais:'Anglais', espagnol:'Espagnol' };

  let reviewHtml = '';
  questions.forEach(function(q, i) {
    const userAnswer = state.answers[i];
    const isCorrect = userAnswer === q.a;

    reviewHtml += '<div style="background:var(--card);border:1px solid '+(isCorrect?'var(--green)':'var(--red)')+';border-left:4px solid '+(isCorrect?'var(--green)':'var(--red)')+';border-radius:var(--radius-sm);padding:1rem 1.2rem;margin-bottom:0.6rem;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">' +
        '<span style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);">Question '+(i+1)+' · Niveau '+q.level+'</span>' +
        '<span style="font-size:0.78rem;font-weight:700;color:'+(isCorrect?'var(--green)':'var(--red)')+';">'+(isCorrect?'✓ Correct':'✗ Incorrect')+'</span>' +
      '</div>' +
      '<div style="font-weight:600;font-size:0.95rem;margin-bottom:0.5rem;">'+q.q+'</div>';

    if (isCorrect) {
      reviewHtml += '<div style="font-size:0.85rem;color:var(--green);font-weight:500;">→ '+q.o[q.a]+'</div>';
    } else {
      reviewHtml += '<div style="font-size:0.85rem;color:var(--red);margin-bottom:0.2rem;"><s>Votre réponse : '+q.o[userAnswer]+'</s></div>' +
        '<div style="font-size:0.85rem;color:var(--green);font-weight:600;">Bonne réponse : '+q.o[q.a]+'</div>';
    }
    reviewHtml += '</div>';
  });

  app.innerHTML =
    '<div class="result-card">' +
      '<div style="font-size:0.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Votre niveau en '+langLabels[state.langue]+'</div>' +
      '<div class="result-level">'+level.code+'</div>' +
      '<div class="result-label">'+level.label+'</div>' +
      '<div class="result-score">'+state.score+' / '+total+' bonnes réponses ('+pct+'%)</div>' +
      '<div class="result-desc">'+level.desc+'</div>' +
      '<div style="background:var(--accent-bg);padding:1rem;border-radius:var(--radius-sm);margin-bottom:1.5rem;font-size:0.9rem;">' +
        '<strong>Et maintenant ?</strong> Obtenez un devis personnalisé pour une formation adaptée à votre niveau '+level.code+' et atteignez le niveau supérieur !' +
      '</div>' +
      '<div class="result-actions">' +
        '<a href="vocelia-devis.html" class="btn btn-primary">Obtenir mon devis →</a>' +
        '<button class="btn btn-secondary" onclick="state.screen=\'intro\';render();">Refaire le test</button>' +
        '<a href="vocelia-landing.html" class="btn btn-secondary">Retour au site</a>' +
      '</div>' +
    '</div>' +
    '<div style="margin-top:2rem;">' +
      '<div style="font-family:\'Playfair Display\',serif;font-size:1.3rem;font-weight:700;margin-bottom:1rem;">Détail de vos réponses</div>' +
      reviewHtml +
    '</div>';
}

// Init
render();
</script>
</body>
</html>
